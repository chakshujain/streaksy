name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:       # Allow manual trigger from GitHub UI

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Don't cancel in-progress deploys

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Only deploy if CI tests would pass (same checks inline for speed)
    steps:
      - uses: actions/checkout@v4

      # ── Quick backend compile check before deploying ───────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: TypeScript compile check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Run backend tests
        working-directory: backend
        run: npm test

      # ── Deploy to EC2 via SSH ──────────────────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            export DEPLOY_BRANCH=main
            cd /home/${{ secrets.EC2_USER }}/streaksy
            bash deploy/deploy.sh

      # ── Health check ───────────────────────────────────────────────
      - name: Health check
        run: |
          echo "Waiting 10s for services to start..."
          sleep 10
          STATUS=$(curl -sf http://${{ secrets.EC2_HOST }}:3001/health || echo "FAILED")
          echo "Health check response: $STATUS"
          if echo "$STATUS" | grep -q "FAILED"; then
            echo "::warning::Health check failed – services may still be starting"
          fi
