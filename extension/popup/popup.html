<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solvo</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          <path d="M8 12l3 3 5-5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo-text">Solvo</span>
      </div>
    </header>

    <!-- Login View -->
    <div id="login-view" class="view hidden">
      <p class="subtitle">Sign in to sync your LeetCode progress</p>
      <form id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <div id="login-error" class="error hidden"></div>
        <button type="submit" id="login-btn" class="btn btn-primary">
          Sign In
        </button>
      </form>
    </div>

    <!-- Authenticated View -->
    <div id="main-view" class="view hidden">
      <!-- User info -->
      <div class="user-bar">
        <div class="user-info">
          <div class="avatar" id="user-avatar">U</div>
          <div>
            <div class="user-name" id="user-name">User</div>
            <div class="user-email" id="user-email">user@email.com</div>
          </div>
        </div>
        <button id="logout-btn" class="btn btn-ghost btn-sm" title="Log out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>

      <!-- Sync Status -->
      <div class="status-card" id="status-card">
        <div class="status-indicator" id="status-indicator"></div>
        <div class="status-text">
          <div class="status-label" id="status-label">Ready</div>
          <div class="status-detail" id="status-detail">Waiting for submissions...</div>
        </div>
      </div>

      <!-- Recent Syncs -->
      <div class="section">
        <div class="section-title">Recent Syncs</div>
        <div id="sync-history" class="history-list">
          <div class="empty-state">No syncs yet</div>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
